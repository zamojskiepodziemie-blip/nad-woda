*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf5;--border:2px solid #000;--shadow:4px 4px 0 #000;--shadow-hover:2px 2px 0 #000;--accent:#FFE500;--text:#000}
body{background:var(--bg) url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200') center/cover no-repeat fixed;font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh}
header{background:var(--accent);border-bottom:var(--border);padding:1.5rem;text-align:center;box-shadow:var(--shadow)}
header h1{font-weight:900;font-size:2rem;text-transform:uppercase;letter-spacing:2px}
.container{max-width:800px;margin:0 auto;padding:1.5rem}
.map-box{background:#fff;border:var(--border);padding:1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.map-title{text-align:center;font-weight:900;font-size:1.2rem;margin-bottom:1rem;text-transform:uppercase}
svg{width:100%;height:auto}
path{cursor:pointer;fill:#fff;stroke:#000;stroke-width:2;transition:all 0.1s}
path:hover{fill:var(--accent);transform:translate(-2px,-2px)}
text{font-size:6px;fill:#000;font-weight:900;text-anchor:middle;pointer-events:none}
.filters{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.btn{padding:1rem;border:var(--border);background:#fff;font-weight:900;text-transform:uppercase;cursor:pointer;box-shadow:var(--shadow);transition:all 0.1s;font-size:0.9rem}
.btn:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-hover)}
.btn.active{background:var(--accent);transform:translate(2px,2px);box-shadow:var(--shadow-hover)}
.lista{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.item{background:#fff;border:var(--border);padding:1.2rem;cursor:pointer;box-shadow:var(--shadow);transition:all 0.1s}
.item:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-hover)}
.item h3{font-weight:900;font-size:1.1rem;margin-bottom:0.5rem;text-transform:uppercase}
.typ{display:inline-block;padding:4px 12px;border:var(--border);font-weight:900;font-size:0.75rem;text-transform:uppercase;margin-bottom:0.5rem}
.typ.paid{background:var(--accent)}
.typ.pzw{background:#fff}
.item p{font-weight:700;font-size:0.9rem}
.hidden{display:none}
.back-btn{padding:1rem 2rem;background:var(--accent);border:var(--border);cursor:pointer;font-weight:900;text-transform:uppercase;margin-bottom:1rem;box-shadow:var(--shadow);display:inline-block}
.back-btn:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-hover)}
.tytul{font-weight:900;font-size:1.5rem;text-transform:uppercase;margin-bottom:1rem;text-align:center}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;display:none;overflow-y:auto}
.modal.aktywna{display:block}
.okno{background:var(--bg);margin:1rem;border:var(--border);max-width:600px;box-shadow:var(--shadow)}
.zamknij{position:absolute;top:1rem;right:1rem;background:var(--accent);border:var(--border);width:40px;height:40px;font-size:1.5rem;font-weight:900;cursor:pointer;box-shadow:var(--shadow)}
.zamknij:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-hover)}
.obraz{height:200px;background-size:cover;background-position:center;position:relative;border-bottom:var(--border)}
.obraz::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--bg))}
.cialo{padding:1.5rem}
.cialo h2{font-weight:900;font-size:1.4rem;margin-bottom:1rem;text-transform:uppercase}
.sekcja{border:var(--border);padding:1rem;margin-bottom:1rem;background:#fff;box-shadow:var(--shadow)}
.sekcja h4{font-weight:900;text-transform:uppercase;margin-bottom:0.5rem}
.tagi{display:flex;flex-wrap:wrap;gap:8px}
.tag{background:var(--accent);border:var(--border);padding:6px 12px;font-weight:900;font-size:0.8rem;text-transform:uppercase}
.trasa{display:block;padding:1rem;background:var(--accent);border:var(--border);text-align:center;text-decoration:none;color:#000;font-weight:900;text-transform:uppercase;margin-top:1rem;box-shadow:var(--shadow)}
.trasa:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-hover)}
.puste{text-align:center;padding:3rem;border:var(--border);background:#fff;box-shadow:var(--shadow)}
.puste h2{font-weight:900;font-size:1.5rem;text-transform:uppercase;margin-bottom:1rem}
.puste p{font-weight:700;font-size:1.1rem}
@media(max-width:600px){.container{padding:1rem}.lista{grid-template-columns:1fr}}
</style>
</head>

var aktualne=null;
var filtr='all';
var wybrane=null;
function wybierzWoj(w){aktualne=w;document.getElementById('mapaWidok').classList.add('hidden');document.getElementById('puste').classList.add('hidden');document.getElementById('wstecz').classList.remove('hidden');document.getElementById('tytulWoj').classList.remove('hidden');document.getElementById('tytulWoj').innerText='ŁOWISKA - '+w.toUpperCase();document.getElementById('filtry').classList.remove('hidden');render();}
function wroc(){aktualne=null;document.getElementById('mapaWidok').classList.remove('hidden');document.getElementById('puste').classList.remove('hidden');document.getElementById('wstecz').classList.add('hidden');document.getElementById('tytulWoj').classList.add('hidden');document.getElementById('filtry').classList.add('hidden');document.getElementById('lista').innerHTML='';filtr='all';document.getElementById('btnW').className='btn active';document.getElementById('btnP').className='btn';document.getElementById('btnZ').className='btn';}
function ustawFiltr(f){filtr=f;document.getElementById('btnW').className='btn'+(f==='all'?' active':'');document.getElementById('btnP').className='btn'+(f==='paid'?' active':'');document.getElementById('btnZ').className='btn'+(f==='pzw'?' active':'');render();}
function render(){var l=document.getElementById('lista');l.innerHTML='';if(!aktualne||!lowiska[aktualne])return;var arr=lowiska[aktualne];if(filtr!=='all'){arr=arr.filter(function(x){return x.t===filtr;});}
arr.forEach(function(x,i){var d=document.createElement('div');d.className='item';d.innerHTML='<h3>'+x.n+'</h3><span class="typ '+x.t+'">'+(x.t==='paid'?'PLATNE':'PZW')+'</span><p>'+x.l+'</p>';d.onclick=function(){pokazLowisko(i);};l.appendChild(d);});if(arr.length===0){l.innerHTML='<div class="puste"><p>BRAK LOWISK</p></div>';}}
function pokazLowisko(i){var arr=lowiska[aktualne];if(filtr!=='all'){arr=arr.filter(function(x){return x.t===filtr;});}
wybrane=arr[i];document.getElementById('mTytul').innerText=wybrane.n;document.getElementById('mTyp').innerText=wybrane.t==='paid'?'PLATNE':'PZW';document.getElementById('mTyp').className='typ '+wybrane.t;document.getElementById('modalObraz').style.backgroundImage='url('+fishImages[Math.floor(Math.random()*fishImages.length)]+')';var ryby='';for(var j=0;j<wybrane.f.length;j++){ryby+='<span class="tag">'+wybrane.f[j]+'</span>';}
document.getElementById('mRyby').innerHTML=ryby;if(wybrane.t==='paid'){document.getElementById('mKontaktSekc').classList.remove('hidden');document.getElementById('mKontakt').innerText=wybrane.c;}else{document.getElementById('mKontaktSekc').classList.add('hidden');}
document.getElementById('mGodziny').innerText=wybrane.h;document.getElementById('mLokal').innerText=wybrane.l;document.getElementById('mTrasa').href='https://www.google.com/maps/dir/?api=1&destination='+wybrane.la+','+wybrane.lo;document.getElementById('modal').classList.add('aktywna');}
function zamknijModal(){document.getElementById('modal').classList.remove('aktywna');}
